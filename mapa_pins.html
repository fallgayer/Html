<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Pins</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --bg:#0d1117;
    --panel:#151b23;
    --border:#2a3441;
    --text:#e6edf3;
    --muted:#8b96a5;
    --accent:#4fd1c5;
    --accent-dim:#1f4a47;
    --danger:#e06c75;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  header{
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  header h1{
    font-size:15px;
    font-weight:600;
    margin:0;
    color:var(--accent);
    letter-spacing:.3px;
  }
  header .hint{
    font-size:12px;
    color:var(--muted);
  }
  .layout{
    flex:1;
    display:flex;
    min-height:0;
    position:relative;
  }
  #map{
    flex:1;
    min-width:0;
  }
  #panel{
    width:340px;
    background:var(--panel);
    border-left:1px solid var(--border);
    display:flex;
    flex-direction:column;
    min-height:0;
    transition:width .2s ease, transform .2s ease;
    overflow:hidden;
    flex-shrink:0;
  }
  #panel.collapsed{
    width:0;
    border-left:none;
  }
  #panel-inner{
    width:340px;
    height:100%;
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  #toggle-btn{
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    width:34px;
    height:34px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--accent);
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #toggle-btn:hover{ background:#1c2531; }
  #search-box{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    width:min(320px, calc(100% - 140px));
  }
  #search-input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 12px;
    border-radius:8px;
    font-size:13px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  #search-input:focus{
    outline:none;
    border-color:var(--accent);
  }
  #search-results{
    margin-top:6px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
    display:none;
  }
  #search-results.show{ display:block; }
  .search-result{
    padding:9px 12px;
    font-size:12.5px;
    color:var(--text);
    cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .search-result:last-child{ border-bottom:none; }
  .search-result:hover{ background:#1c2531; }
  .search-result .r-name{ color:var(--accent); font-weight:600; }
  #search-loading{
    padding:8px 12px;
    font-size:12px;
    color:var(--muted);
  }
  #layer-btn{
    position:absolute;
    top:10px;
    right:54px;
    z-index:1000;
    width:34px;
    height:34px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--accent);
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #layer-btn:hover{ background:#1c2531; }
  #layer-menu{
    position:absolute;
    top:50px;
    right:54px;
    z-index:1000;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
    display:none;
    min-width:160px;
  }
  #layer-menu.show{ display:block; }
  .layer-option{
    padding:9px 12px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .layer-option:last-child{ border-bottom:none; }
  .layer-option:hover{ background:#1c2531; }
  .layer-option.active{ color:var(--accent); font-weight:600; }
  @media (max-width: 640px){
    #panel{
      position:absolute;
      right:0;
      top:0;
      bottom:0;
      z-index:900;
      box-shadow:-4px 0 12px rgba(0,0,0,.4);
    }
    #panel.collapsed{
      transform:translateX(100%);
      width:340px;
    }
    header .hint{ display:none; }
    .leaflet-control-zoom{
      margin-bottom:28px !important;
    }
  }
  #panel-header{
    padding:12px 14px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #panel-header span{
    font-size:12px;
    color:var(--muted);
    font-family:'SF Mono',Consolas,monospace;
  }
  #list{
    flex:1;
    overflow-y:auto;
    padding:8px;
  }
  .pin-item{
    background:#1c2531;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .pin-item .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .pin-item input[type="text"]{
    flex:1;
    background:#0d1117;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:5px;
    padding:5px 8px;
    font-size:13px;
  }
  .pin-item input[type="text"]:focus{
    outline:none;
    border-color:var(--accent);
  }
  .coords{
    font-family:'SF Mono',Consolas,monospace;
    font-size:11px;
    color:var(--muted);
  }
  .del-btn{
    background:none;
    border:none;
    color:var(--danger);
    cursor:pointer;
    font-size:16px;
    line-height:1;
    padding:2px 6px;
  }
  .del-btn:hover{ opacity:.7; }
  #empty-msg{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    padding:30px 12px;
  }
  #actions{
    padding:12px;
    border-top:1px solid var(--border);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  button.action{
    background:var(--accent-dim);
    border:1px solid var(--accent);
    color:var(--accent);
    padding:9px 10px;
    border-radius:6px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s;
  }
  button.action:hover{ background:#2a615c; }
  button.action.secondary{
    background:transparent;
    border-color:var(--border);
    color:var(--text);
  }
  button.action.secondary:hover{ background:#1c2531; }
  #copy-feedback{
    font-size:11px;
    color:var(--accent);
    text-align:center;
    height:14px;
  }
  .leaflet-popup-content-wrapper{
    background:#1c2531;
    color:var(--text);
  }
  .leaflet-popup-tip{ background:#1c2531; }
  .leaflet-control-zoom a{
    background:var(--panel) !important;
    color:var(--accent) !important;
    border-color:var(--border) !important;
  }
  .leaflet-control-zoom a:hover{
    background:#1c2531 !important;
  }
  .leaflet-control-attribution{
    background:rgba(13,17,23,.7) !important;
    color:var(--muted) !important;
  }
  .leaflet-control-attribution a{ color:var(--accent) !important; }
</style>
</head>
<body>

<header>
  <h1>📍 MAPA DE PINS</h1>
  <span class="hint">clique no mapa para adicionar um ponto</span>
</header>

<div class="layout">
  <div id="map"></div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="🔍 Pesquisar lugar...">
    <div id="search-results"></div>
  </div>
  <button id="layer-btn" title="Tipo de mapa">🗺️</button>
  <div id="layer-menu"></div>
  <button id="toggle-btn" title="Mostrar/ocultar lista">☰</button>
  <div id="panel">
    <div id="panel-inner">
      <div id="panel-header">
        <span id="count-label">0 pontos</span>
        <span id="area-hint"></span>
      </div>
      <div id="list">
        <div id="empty-msg">Nenhum ponto ainda.<br>Clique no mapa para começar.</div>
      </div>
      <div id="actions">
        <label id="decimal-toggle" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);cursor:pointer;">
          <input type="checkbox" id="chk-comma" style="accent-color:var(--accent);width:14px;height:14px;">
          Usar vírgula como decimal (formato BR)
        </label>
        <button class="action" id="btn-csv">⬇ Baixar CSV</button>
        <button class="action secondary" id="btn-copy">📋 Copiar como CSV</button>
        <button class="action secondary" id="btn-clear">🗑 Limpar tudo</button>
        <div id="copy-feedback"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const map = L.map('map', { zoomControl: false }).setView([-30.0346, -51.2177], 12); // Porto Alegre
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  const basemaps = {
    escuro: {
      name: 'Escuro',
      icon: '🌑',
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    },
    claro: {
      name: 'Claro',
      icon: '☀️',
      url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    },
    ruas: {
      name: 'Ruas (OSM)',
      icon: '🛣️',
      url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    },
    satelite: {
      name: 'Satélite',
      icon: '🛰️',
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      attribution: '&copy; Esri',
      maxZoom: 19
    },
    relevo: {
      name: 'Relevo',
      icon: '⛰️',
      url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenTopoMap contributors',
      maxZoom: 17
    }
  };

  let currentBasemapKey = 'escuro';
  let currentTileLayer = L.tileLayer(basemaps[currentBasemapKey].url, {
    attribution: basemaps[currentBasemapKey].attribution,
    maxZoom: basemaps[currentBasemapKey].maxZoom
  }).addTo(map);

  function switchBasemap(key){
    if(key === currentBasemapKey) return;
    map.removeLayer(currentTileLayer);
    currentTileLayer = L.tileLayer(basemaps[key].url, {
      attribution: basemaps[key].attribution,
      maxZoom: basemaps[key].maxZoom
    }).addTo(map);
    currentBasemapKey = key;
    renderLayerMenu();
  }

  function renderLayerMenu(){
    const menu = document.getElementById('layer-menu');
    menu.innerHTML = '';
    Object.keys(basemaps).forEach(key => {
      const opt = document.createElement('div');
      opt.className = 'layer-option' + (key === currentBasemapKey ? ' active' : '');
      opt.innerHTML = `<span>${basemaps[key].icon}</span><span>${basemaps[key].name}</span>`;
      opt.addEventListener('click', () => {
        switchBasemap(key);
        menu.classList.remove('show');
      });
      menu.appendChild(opt);
    });
  }
  renderLayerMenu();

  const layerBtn = document.getElementById('layer-btn');
  const layerMenu = document.getElementById('layer-menu');
  layerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    layerMenu.classList.toggle('show');
  });
  document.addEventListener('click', (e) => {
    if(!layerMenu.contains(e.target) && e.target !== layerBtn){
      layerMenu.classList.remove('show');
    }
  });

  const panel = document.getElementById('panel');
  const toggleBtn = document.getElementById('toggle-btn');

  function isMobile(){
    return window.matchMedia('(max-width: 640px)').matches;
  }

  // Painel começa recolhido no celular, aberto no desktop
  if(isMobile()){
    panel.classList.add('collapsed');
  }

  toggleBtn.addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    setTimeout(() => map.invalidateSize(), 220);
  });

  panel.addEventListener('transitionend', () => map.invalidateSize());

  // Corrige o corte dos controles quando a barra de endereço do navegador
  // mobile aparece/desaparece e muda a altura real da viewport
  function fixViewportHeight(){
    map.invalidateSize();
  }
  window.addEventListener('resize', fixViewportHeight);
  window.addEventListener('orientationchange', () => setTimeout(fixViewportHeight, 300));
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', fixViewportHeight);
  }
  setTimeout(fixViewportHeight, 300);

  // --- Pesquisa de lugares (Nominatim / OpenStreetMap) ---
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  let searchTimeout = null;

  function closeResults(){
    searchResults.classList.remove('show');
    searchResults.innerHTML = '';
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    clearTimeout(searchTimeout);
    if(q.length < 3){
      closeResults();
      return;
    }
    searchTimeout = setTimeout(() => runSearch(q), 400);
  });

  searchInput.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeResults();
  });

  document.addEventListener('click', (e) => {
    if(!searchResults.contains(e.target) && e.target !== searchInput){
      closeResults();
    }
  });

  async function runSearch(query){
    searchResults.innerHTML = '<div id="search-loading">Buscando...</div>';
    searchResults.classList.add('show');
    try{
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=pt-BR&q=${encodeURIComponent(query)}`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if(!resp.ok){
        throw new Error('HTTP ' + resp.status);
      }
      const data = await resp.json();
      renderResults(data);
    }catch(err){
      searchResults.innerHTML = `<div id="search-loading">Erro na busca (${escapeHtml(err.message || 'rede bloqueada')}).<br>Se estiver vendo isso na pré-visualização do chat, baixe o arquivo e abra direto no navegador.</div>`;
    }
  }

  function renderResults(results){
    if(!results || results.length === 0){
      searchResults.innerHTML = '<div id="search-loading">Nenhum resultado encontrado.</div>';
      return;
    }
    searchResults.innerHTML = '';
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result';
      const parts = r.display_name.split(',');
      const mainName = parts[0];
      const rest = parts.slice(1).join(',').trim();
      div.innerHTML = `<div class="r-name">${escapeHtml(mainName)}</div><div>${escapeHtml(rest)}</div>`;
      div.addEventListener('click', () => {
        const lat = parseFloat(r.lat);
        const lng = parseFloat(r.lon);
        map.flyTo([lat, lng], 16);
        addPin(lat, lng, mainName);
        closeResults();
        searchInput.value = '';
      });
      searchResults.appendChild(div);
    });
  }

  function addPin(lat, lng, label){
    const pin = {
      id: idCounter++,
      label: label || ('Ponto ' + (pins.length + 1)),
      lat: lat,
      lng: lng
    };
    pin.marker = makeMarker(pin);
    pins.push(pin);
    renderList();
  }

  let pins = [];
  let idCounter = 1;

  function makeMarker(pin){
    const marker = L.marker([pin.lat, pin.lng], {draggable:true}).addTo(map);
    marker.bindPopup(`Ponto #${pin.id}`);
    marker.on('dragend', function(){
      const pos = marker.getLatLng();
      pin.lat = pos.lat;
      pin.lng = pos.lng;
      renderList();
    });
    return marker;
  }

  map.on('click', function(e){
    addPin(e.latlng.lat, e.latlng.lng);
  });

  function removePin(id){
    const idx = pins.findIndex(p => p.id === id);
    if(idx !== -1){
      map.removeLayer(pins[idx].marker);
      pins.splice(idx, 1);
      renderList();
    }
  }

  function renderList(){
    const list = document.getElementById('list');
    const countLabel = document.getElementById('count-label');
    countLabel.textContent = pins.length + (pins.length === 1 ? ' ponto' : ' pontos');

    if(pins.length === 0){
      list.innerHTML = '<div id="empty-msg">Nenhum ponto ainda.<br>Clique no mapa para começar.</div>';
      return;
    }

    list.innerHTML = '';
    pins.forEach(pin => {
      const item = document.createElement('div');
      item.className = 'pin-item';
      item.innerHTML = `
        <div class="row">
          <input type="text" value="${escapeHtml(pin.label)}" data-id="${pin.id}" class="label-input">
          <button class="del-btn" data-id="${pin.id}" title="Remover">✕</button>
        </div>
        <div class="coords">${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}</div>
      `;
      list.appendChild(item);
    });

    list.querySelectorAll('.label-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const id = parseInt(e.target.dataset.id);
        const pin = pins.find(p => p.id === id);
        if(pin){
          pin.label = e.target.value;
          pin.marker.getPopup().setContent(escapeHtml(pin.label));
        }
      });
    });

    list.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        removePin(parseInt(e.target.dataset.id));
      });
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function buildCsv(){
    const useComma = document.getElementById('chk-comma').checked;
    const sep = useComma ? ';' : ',';
    const fmtNum = (n) => useComma ? n.toString().replace('.', ',') : n.toString();

    const header = ['label','latitude','longitude'].join(sep);
    const rows = pins.map(p => {
      const safeLabel = '"' + p.label.replace(/"/g, '""') + '"';
      return [safeLabel, fmtNum(p.lat), fmtNum(p.lng)].join(sep);
    });
    return [header, ...rows].join('\n');
  }

  document.getElementById('btn-csv').addEventListener('click', () => {
    if(pins.length === 0) return;
    const csv = buildCsv();
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pontos.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('btn-copy').addEventListener('click', () => {
    if(pins.length === 0) return;
    const csv = buildCsv();
    const feedback = document.getElementById('copy-feedback');
    navigator.clipboard.writeText(csv).then(() => {
      feedback.textContent = 'Copiado ✓';
      setTimeout(() => feedback.textContent = '', 1800);
    }).catch(() => {
      feedback.textContent = 'Falha ao copiar';
      setTimeout(() => feedback.textContent = '', 1800);
    });
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    if(pins.length === 0) return;
    if(confirm('Remover todos os pontos?')){
      pins.forEach(p => map.removeLayer(p.marker));
      pins = [];
      renderList();
    }
  });
</script>

</body>
</html>
