<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Taxas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #151820;
    --border:  #1f2433;
    --muted:   #3a4055;
    --text:    #c8cfe0;
    --bright:  #eef1f8;
    --selic:   #4c9eff;
    --other:   #a0e878;
    --delta:   #f5c542;
    --accent:  #a0e878;
    --danger:  #ff6b6b;
    --radius:  10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  header {
    max-width: 860px;
    margin: 0 auto 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--bright);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  header span.tag {
    font-family: 'Fira Code', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    background: rgba(160,232,120,0.1);
    border: 1px solid rgba(160,232,120,0.25);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    gap: 24px;
  }

  /* ── INPUTS GRID ── */
  .inputs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) {
    .inputs-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  /* card header row: label + period toggle */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }
  .card-header .card-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .card.selic  .card-label { color: var(--selic); }
  .card.other  .card-label { color: var(--other); }
  .card.capital .card-label { color: var(--muted); }

  /* pill toggle: Mês / Ano */
  .pill-toggle {
    display: flex;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .pill-toggle button {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 9px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .pill-toggle button.active {
    background: var(--surface);
    color: var(--bright);
    border-radius: 5px;
    margin: 2px;
  }
  .card.selic .pill-toggle button.active  { color: var(--selic); }
  .card.other .pill-toggle button.active  { color: var(--other); }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-row input[type="number"] {
    font-family: 'Fira Code', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--bright);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    -moz-appearance: textfield;
  }
  .input-row input[type="number"]::-webkit-outer-spin-button,
  .input-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .unit {
    font-family: 'Fira Code', monospace;
    font-size: 0.9rem;
    color: var(--muted);
    white-space: nowrap;
  }
  /* equivalent rate hint */
  .rate-hint {
    font-family: 'Fira Code', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 8px;
    min-height: 14px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .card.selic   input[type="range"]::-webkit-slider-thumb { background: var(--selic); }
  .card.other   input[type="range"]::-webkit-slider-thumb { background: var(--other); }
  .card.capital input[type="range"]::-webkit-slider-thumb { background: var(--text);  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    cursor: pointer;
  }

  /* ── APORTE CARD ── */
  .aporte-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: grid;
    gap: 16px;
  }
  .aporte-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .aporte-header .title {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* toggle switch */
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 16px; height: 16px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: rgba(160,232,120,0.2); border: 1px solid rgba(160,232,120,0.4); }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--accent); }

  .aporte-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    transition: opacity 0.2s;
  }
  .aporte-body.disabled { opacity: 0.3; pointer-events: none; }

  .aporte-field label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .aporte-field .input-row { margin-bottom: 8px; }
  .aporte-field .input-row input[type="number"] { font-size: 1.2rem; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chips button {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chips button:hover  { border-color: var(--delta); color: var(--delta); }
  .chips button.active { border-color: var(--delta); color: var(--delta); background: rgba(245,197,66,0.08); }

  /* ── DELTA BANNER ── */
  .delta-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .delta-banner .stat { text-align: center; }
  .delta-banner .stat .value {
    font-family: 'Fira Code', monospace;
    font-size: 1.35rem;
    font-weight: 600;
  }
  .delta-banner .stat .sublabel {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  #stat-selic { color: var(--selic); }
  #stat-other { color: var(--other); }
  #stat-delta { color: var(--delta); }

  /* ── PERIOD SELECTOR ── */
  .period-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .period-row button {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .period-row button:hover  { border-color: var(--accent); color: var(--accent); }
  .period-row button.active { border-color: var(--accent); color: var(--accent); background: rgba(160,232,120,0.07); }

  /* ── CHART ── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 16px 16px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 8px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .legend { display: flex; gap: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }
  canvas { display: block; width: 100% !important; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    background: #1a1e2a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.78rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 99;
    min-width: 160px;
  }
  #tooltip .tip-month { color: var(--muted); margin-bottom: 6px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; }
  #tooltip .tip-row   { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 3px; }
  #tooltip .tip-val   { font-family: 'Fira Code', monospace; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>Simulador de Taxas</h1>
  <span class="tag">rendimento mensal</span>
</header>

<div class="container">

  <!-- INPUTS -->
  <div class="inputs-grid">

    <!-- INDICADOR -->
    <div class="card selic">
      <div class="card-header">
        <span class="card-label">Indicador</span>
        <div class="pill-toggle" id="selicPeriod">
          <button data-p="year" class="active">Ano</button>
          <button data-p="month">Mês</button>
        </div>
      </div>
      <div class="input-row">
        <input type="number" id="selicVal" value="10.5" min="0" max="100" step="0.25">
        <span class="unit" id="selicUnit">% a.a.</span>
      </div>
      <div class="rate-hint" id="selicHint"></div>
      <input type="range" id="selicSlider" min="0" max="30" step="0.25" value="10.5">
    </div>

    <!-- INVESTIMENTO -->
    <div class="card other">
      <div class="card-header">
        <span class="card-label">Investimento</span>
        <div class="pill-toggle" id="otherPeriod">
          <button data-p="year" class="active">Ano</button>
          <button data-p="month">Mês</button>
        </div>
      </div>
      <div class="input-row">
        <input type="number" id="otherVal" value="14.0" min="0" max="100" step="0.25">
        <span class="unit" id="otherUnit">% a.a.</span>
      </div>
      <div class="rate-hint" id="otherHint"></div>
      <input type="range" id="otherSlider" min="0" max="50" step="0.25" value="14.0">
    </div>

    <!-- CAPITAL -->
    <div class="card capital">
      <div class="card-header">
        <span class="card-label">Capital inicial</span>
      </div>
      <div class="input-row">
        <span class="unit">R$</span>
        <input type="number" id="capitalVal" value="10000" min="100" max="10000000" step="100">
      </div>
      <div class="rate-hint"></div>
      <input type="range" id="capitalSlider" min="100" max="500000" step="100" value="10000">
    </div>

  </div>

  <!-- APORTE MENSAL -->
  <div class="aporte-card">
    <div class="aporte-header">
      <span class="title">Aporte mensal</span>
      <label class="toggle">
        <input type="checkbox" id="aporteToggle">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="aporte-body disabled" id="aporteBody">
      <div class="aporte-field">
        <label>Valor do aporte</label>
        <div class="input-row">
          <span class="unit">R$</span>
          <input type="number" id="aporteVal" value="500" min="0" max="100000" step="50">
        </div>
        <input type="range" id="aporteSlider" min="0" max="10000" step="50" value="500">
      </div>
      <div class="aporte-field">
        <label>Fazer aportes por</label>
        <div class="chips" id="aporteChips">
          <button data-m="3">3 m</button>
          <button data-m="6" class="active">6 m</button>
          <button data-m="12">12 m</button>
          <button data-m="24">24 m</button>
          <button data-m="0">todo período</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DELTA BANNER -->
  <div class="delta-banner">
    <div class="stat">
      <div class="value" id="stat-selic">—</div>
      <div class="sublabel">Indicador ao final</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-other">—</div>
      <div class="sublabel">Investimento ao final</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-delta">—</div>
      <div class="sublabel">Diferença acumulada</div>
    </div>
    <div class="period-row" id="periodRow">
      <button data-m="6">6 m</button>
      <button data-m="12">1 ano</button>
      <button data-m="24" class="active">2 anos</button>
      <button data-m="60">5 anos</button>
      <button data-m="120">10 anos</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-wrap">
    <div class="chart-header">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--selic)"></div> <span id="legend-selic">Indicador</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--other)"></div> <span id="legend-other">Investimento</span></div>
      </div>
    </div>
    <canvas id="chart" height="320"></canvas>
  </div>

</div>

<div id="tooltip">
  <div class="tip-month" id="tip-month"></div>
  <div class="tip-row"><span style="color:var(--selic)" id="tip-label-selic">Indicador</span><span class="tip-val" id="tip-selic"></span></div>
  <div class="tip-row"><span style="color:var(--other)" id="tip-label-other">Investimento</span><span class="tip-val" id="tip-other"></span></div>
  <div class="tip-row"><span style="color:var(--delta)">Δ</span><span class="tip-val" id="tip-delta"></span></div>
</div>

<script>
  // ── state ──
  let months      = 24;
  let aporteMonths = 6;
  let chart       = null;
  let selicPeriod = 'year';   // 'year' | 'month'
  let otherPeriod = 'year';

  // ── helpers ──
  const fmt = v => 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtPct = v => v.toLocaleString('pt-BR', { minimumFractionDigits: 4, maximumFractionDigits: 4 }) + '%';

  const monthLabel = i => {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + i);
    return d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
  };

  // Converte a taxa digitada para taxa mensal efetiva
  function toMonthlyRate(pct, period) {
    if (period === 'month') return pct / 100;
    return Math.pow(1 + pct / 100, 1 / 12) - 1;
  }

  // Taxa equivalente exibida como hint
  function equivalentHint(pct, period) {
    if (pct === 0) return '';
    if (period === 'year') {
      const m = (Math.pow(1 + pct / 100, 1 / 12) - 1) * 100;
      return '≈ ' + fmtPct(m) + ' a.m.';
    } else {
      const a = (Math.pow(1 + pct / 100, 12) - 1) * 100;
      return '≈ ' + fmtPct(a) + ' a.a.';
    }
  }

  function getInputs() {
    const aporteOn = document.getElementById('aporteToggle').checked;
    const selicRaw = parseFloat(document.getElementById('selicVal').value) || 0;
    const otherRaw = parseFloat(document.getElementById('otherVal').value) || 0;
    return {
      selicMonthly: toMonthlyRate(selicRaw, selicPeriod),
      otherMonthly: toMonthlyRate(otherRaw, otherPeriod),
      capital:      parseFloat(document.getElementById('capitalVal').value) || 1000,
      aporteOn,
      aporte:       aporteOn ? (parseFloat(document.getElementById('aporteVal').value) || 0) : 0,
      aporteLimit:  aporteOn ? aporteMonths : 0,
    };
  }

  function updateHints() {
    const selicRaw = parseFloat(document.getElementById('selicVal').value) || 0;
    const otherRaw = parseFloat(document.getElementById('otherVal').value) || 0;
    document.getElementById('selicHint').textContent = equivalentHint(selicRaw, selicPeriod);
    document.getElementById('otherHint').textContent = equivalentHint(otherRaw, otherPeriod);
    document.getElementById('selicUnit').textContent = selicPeriod === 'year' ? '% a.a.' : '% a.m.';
    document.getElementById('otherUnit').textContent = otherPeriod === 'year' ? '% a.a.' : '% a.m.';
  }

  function monthlySeries(monthlyRate, capital, n, aporte, aporteLimit) {
    const vals = [capital];
    for (let i = 1; i <= n; i++) {
      const prev = vals[i - 1];
      const dep  = (aporte > 0 && (aporteLimit === 0 || i <= aporteLimit)) ? aporte : 0;
      vals.push(prev * (1 + monthlyRate) + dep);
    }
    return vals;
  }

  // ── draw ──
  function drawChart() {
    updateHints();
    const { selicMonthly, otherMonthly, capital, aporte, aporteLimit, aporteOn } = getInputs();
    const labels = Array.from({ length: months + 1 }, (_, i) => monthLabel(i));
    const seData = monthlySeries(selicMonthly, capital, months, aporte, aporteLimit);
    const otData = monthlySeries(otherMonthly, capital, months, aporte, aporteLimit);

    document.getElementById('stat-selic').textContent = fmt(seData[months]);
    document.getElementById('stat-other').textContent = fmt(otData[months]);
    const diff = otData[months] - seData[months];
    const el = document.getElementById('stat-delta');
    el.textContent = (diff >= 0 ? '+' : '') + fmt(diff);
    el.style.color = diff >= 0 ? 'var(--other)' : 'var(--danger)';

    const cvs = document.getElementById('chart');
    const ctx  = cvs.getContext('2d');
    const dpr  = window.devicePixelRatio || 1;
    const W    = cvs.parentElement.clientWidth - 32;
    const H    = 320;
    cvs.width  = W * dpr;
    cvs.height = H * dpr;
    cvs.style.width  = W + 'px';
    cvs.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const PAD = { top: 20, right: 24, bottom: 48, left: 88 };
    const cW  = W - PAD.left - PAD.right;
    const cH  = H - PAD.top  - PAD.bottom;
    ctx.clearRect(0, 0, W, H);

    const allVals = [...seData, ...otData];
    const minV = Math.min(...allVals) * 0.998;
    const maxV = Math.max(...allVals) * 1.002;

    const xOf = i => PAD.left + (i / months) * cW;
    const yOf = v => PAD.top + cH - ((v - minV) / (maxV - minV)) * cH;

    // grid
    ctx.lineWidth = 1;
    for (let s = 0; s <= 5; s++) {
      const v = minV + (maxV - minV) * (s / 5);
      const y = yOf(v);
      ctx.strokeStyle = 'rgba(31,36,51,0.9)';
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cW, y); ctx.stroke();
      ctx.fillStyle = '#3a4055';
      ctx.font = '10px Fira Code';
      ctx.textAlign = 'right';
      ctx.fillText(fmt(v).replace('R$ ', 'R$'), PAD.left - 6, y + 4);
    }

    // aporte shading
    if (aporteOn && aporteLimit > 0 && aporteLimit <= months) {
      ctx.save();
      ctx.fillStyle = 'rgba(245,197,66,0.045)';
      ctx.fillRect(xOf(0), PAD.top, xOf(aporteLimit) - xOf(0), cH);
      ctx.strokeStyle = 'rgba(245,197,66,0.35)';
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(xOf(aporteLimit), PAD.top);
      ctx.lineTo(xOf(aporteLimit), PAD.top + cH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(245,197,66,0.6)';
      ctx.font = '9px Inter';
      ctx.textAlign = 'center';
      ctx.fillText('fim dos aportes', xOf(aporteLimit), PAD.top - 6);
      ctx.restore();
    }

    // x labels
    const step = Math.ceil(months / 8);
    ctx.fillStyle = '#3a4055';
    ctx.font = '10px Inter';
    ctx.textAlign = 'center';
    for (let i = 0; i <= months; i += step) {
      ctx.fillText(labels[i], xOf(i), H - PAD.bottom + 18);
    }

    function drawLine(data, color, dashed) {
      ctx.save();
      ctx.beginPath();
      if (dashed) ctx.setLineDash([5, 4]);
      ctx.lineWidth = 2.2;
      ctx.strokeStyle = color;
      ctx.lineJoin = 'round';
      for (let i = 0; i <= months; i++) {
        const x = xOf(i), y = yOf(data[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(xOf(0), yOf(data[0]));
      for (let i = 1; i <= months; i++) ctx.lineTo(xOf(i), yOf(data[i]));
      ctx.lineTo(xOf(months), PAD.top + cH);
      ctx.lineTo(xOf(0),      PAD.top + cH);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + cH);
      grad.addColorStop(0, color + '28');
      grad.addColorStop(1, color + '00');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    drawLine(seData, '#4c9eff', true);
    drawLine(otData, '#a0e878', false);

    chart = { seData, otData, xOf, yOf, PAD, cW, cH, W, H, labels, minV, maxV, months, cvs };
  }

  // ── pill toggles ──
  function setupPillToggle(containerId, onchange) {
    document.getElementById(containerId).addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('#' + containerId + ' button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onchange(btn.dataset.p);
    });
  }

  setupPillToggle('selicPeriod', p => {
    selicPeriod = p;
    // ajusta slider range para mês (max 5%) ou ano (max 30%)
    const sld = document.getElementById('selicSlider');
    sld.max  = p === 'month' ? 5 : 30;
    sld.step = p === 'month' ? 0.01 : 0.25;
    drawChart();
  });

  setupPillToggle('otherPeriod', p => {
    otherPeriod = p;
    const sld = document.getElementById('otherSlider');
    sld.max  = p === 'month' ? 10 : 50;
    sld.step = p === 'month' ? 0.01 : 0.25;
    drawChart();
  });

  // ── tooltip ──
  const tooltip = document.getElementById('tooltip');
  document.getElementById('chart').addEventListener('mousemove', e => {
    if (!chart) return;
    const rect = chart.cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const { PAD, cW, months } = chart;
    const i = Math.round(((mx - PAD.left) / cW) * months);
    if (i < 0 || i > months) { tooltip.style.opacity = 0; return; }
    const se = chart.seData[i], ot = chart.otData[i];
    document.getElementById('tip-month').textContent = chart.labels[i];
    document.getElementById('tip-selic').textContent = fmt(se);
    document.getElementById('tip-other').textContent = fmt(ot);
    const d = ot - se;
    const tipDelta = document.getElementById('tip-delta');
    tipDelta.textContent = (d >= 0 ? '+' : '') + fmt(d);
    tipDelta.style.color = d >= 0 ? 'var(--other)' : 'var(--danger)';
    tooltip.style.opacity = 1;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 20) + 'px';
  });
  document.getElementById('chart').addEventListener('mouseleave', () => {
    tooltip.style.opacity = 0;
  });

  // ── toggle aporte ──
  document.getElementById('aporteToggle').addEventListener('change', e => {
    document.getElementById('aporteBody').classList.toggle('disabled', !e.target.checked);
    drawChart();
  });

  // ── aporte chips ──
  document.getElementById('aporteChips').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#aporteChips button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    aporteMonths = parseInt(btn.dataset.m);
    drawChart();
  });

  // ── sync sliders / inputs ──
  function syncPair(inputId, sliderId) {
    const inp = document.getElementById(inputId);
    const sld = document.getElementById(sliderId);
    inp.addEventListener('input', () => { sld.value = inp.value; drawChart(); });
    sld.addEventListener('input', () => { inp.value = sld.value; drawChart(); });
  }
  syncPair('selicVal',   'selicSlider');
  syncPair('otherVal',   'otherSlider');
  syncPair('capitalVal', 'capitalSlider');
  syncPair('aporteVal',  'aporteSlider');

  // ── period buttons ──
  document.getElementById('periodRow').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#periodRow button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    months = parseInt(btn.dataset.m);
    drawChart();
  });

  window.addEventListener('resize', drawChart);
  drawChart();
</script>
</body>
</html>
